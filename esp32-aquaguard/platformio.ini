; ============================================================
; AquaGuard — Configuración PlatformIO para ESP32
; ============================================================
; Para compilar y subir:
;   pio run -t upload
; Para monitor serial:
;   pio device monitor
; Para ambos:
;   pio run -t upload && pio device monitor
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; El ESP32 corre a 240MHz por defecto (de sobra para SSL/TLS).

; Compilar solo el firmware principal (excluye los sketches de prueba)
build_src_filter = +<*> -<test_ultrasonic.cpp>

; Librerías
lib_deps =
    mobizt/FirebaseClient @ ^2.2.9

; Resolver dependencias profundamente (necesario para FirebaseClient)
lib_ldf_mode = deep+

; ============================================================
; Entorno de PRUEBA — solo el sensor ultrasónico (sin WiFi/Firebase)
;   pio run -e test_ultrasonic -t upload && pio device monitor
; ============================================================
[env:test_ultrasonic]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Compila SOLO el archivo de prueba
build_src_filter = -<*> +<test_ultrasonic.cpp>
